name: Runway CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, test, and build
    runs-on: windows-latest
    env:
      NODE_ENV: test
      SESSION_SECRET: runway-ci-session-secret-for-github-actions-only
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Migrate database
        run: npm run db:migrate

      - name: Lint and tests
        run: npm run check

      - name: Build client and server
        run: npm run build
